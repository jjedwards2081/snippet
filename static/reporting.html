<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snippet — Reporting</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        :root {
            --bg-base: #1E1E1E;
            --bg-surface: #252526;
            --bg-elevated: #2D2D2D;
            --border: #3C3C3C;
            --text-primary: #CCCCCC;
            --text-secondary: #969696;
            --text-muted: #6D6D6D;
            --ms-blue: #0078D4;
            --ms-green: #3FB950;
            --ms-yellow: #D29922;
            --ms-red: #F85149;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 48px;
            padding: 0 24px;
            background: #181818;
            border-bottom: 1px solid var(--border);
        }

        .topbar-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--ms-blue);
        }

        .topbar a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
        }

        .topbar a:hover {
            color: var(--text-primary);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Metric cards */
        .metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .metric-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--ms-blue);
            line-height: 1.2;
        }

        .metric-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .metric-card:nth-child(2) .metric-value { color: var(--ms-green); }
        .metric-card:nth-child(3) .metric-value { color: var(--ms-yellow); }
        .metric-card:nth-child(4) .metric-value { color: var(--text-primary); }

        /* Chart */
        .panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .panel h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        /* Usage chart */
        .chart-container {
            width: 100%;
            height: 200px;
            position: relative;
        }

        .chart-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 170px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .chart-bar-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 0;
        }

        .chart-bar {
            width: 100%;
            max-width: 20px;
            background: var(--ms-blue);
            border-radius: 2px 2px 0 0;
            min-height: 2px;
            transition: height 0.3s;
        }

        .chart-bar.unique {
            background: var(--ms-green);
        }

        .chart-date {
            font-size: 9px;
            color: var(--text-muted);
            position: absolute;
            bottom: 2px;
            transform: rotate(-45deg);
            transform-origin: top left;
            white-space: nowrap;
        }

        /* Map */
        #map {
            height: 350px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        /* Country table */
        .country-table {
            width: 100%;
            border-collapse: collapse;
        }

        .country-table th {
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        .country-table td {
            padding: 8px 12px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }

        .country-table tr:hover td {
            background: var(--bg-elevated);
        }

        .country-bar {
            height: 6px;
            background: var(--ms-blue);
            border-radius: 3px;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
        }

        /* Legend */
        .chart-legend {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .legend-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            margin-right: 4px;
            vertical-align: middle;
        }

        /* Provider chart */
        .provider-chart {
            display: flex;
            gap: 24px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .provider-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 120px;
        }

        .provider-bar-wrap {
            width: 60px;
            background: var(--bg-base);
            border-radius: 6px;
            height: 120px;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .provider-bar-fill {
            width: 100%;
            border-radius: 0 0 4px 4px;
            min-height: 4px;
            transition: height 0.3s;
        }

        .provider-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .provider-stats {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
        }

        .provider-stats strong {
            font-size: 20px;
            display: block;
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .metrics { grid-template-columns: repeat(2, 1fr); }
            .two-col { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <span class="topbar-title">Snippet Reporting</span>
        <a href="/">Back to App</a>
    </div>

    <div class="container">
        <div class="metrics">
            <div class="metric-card">
                <div class="metric-value" id="dau">-</div>
                <div class="metric-label">Daily Active Users</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="wau">-</div>
                <div class="metric-label">Weekly Active Users</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="mau">-</div>
                <div class="metric-label">Monthly Active Users</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="total">-</div>
                <div class="metric-label">Total Visits</div>
            </div>
        </div>

        <div class="panel">
            <h2>Usage — Last 30 Days</h2>
            <div class="chart-container">
                <div class="chart-bars" id="chart-bars"></div>
            </div>
            <div class="chart-legend">
                <span><span class="legend-dot" style="background:var(--ms-blue)"></span>Total Visits</span>
                <span><span class="legend-dot" style="background:var(--ms-green)"></span>Unique Users</span>
            </div>
        </div>

        <div class="panel">
            <h2>AI Provider Usage</h2>
            <div id="provider-chart" class="provider-chart"></div>
        </div>

        <div class="two-col">
            <div class="panel">
                <h2>Usage by Location</h2>
                <div id="map"></div>
            </div>
            <div class="panel">
                <h2>Top Countries</h2>
                <div id="countries-table"><div class="loading">Loading...</div></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        async function loadReport() {
            var res = await fetch("/api/analytics");
            var data = await res.json();

            // Metrics
            document.getElementById("dau").textContent = data.dau;
            document.getElementById("wau").textContent = data.wau;
            document.getElementById("mau").textContent = data.mau;
            document.getElementById("total").textContent = data.total_visits;

            // Chart
            var chartEl = document.getElementById("chart-bars");
            chartEl.innerHTML = "";
            var maxVisits = Math.max(1, Math.max.apply(null, data.daily.map(function (d) { return d.visits; })));

            data.daily.forEach(function (d, i) {
                var group = document.createElement("div");
                group.className = "chart-bar-group";
                group.style.position = "relative";

                var bar = document.createElement("div");
                bar.className = "chart-bar";
                bar.style.height = Math.max(2, (d.visits / maxVisits) * 150) + "px";
                bar.title = d.date + ": " + d.visits + " visits";

                var barU = document.createElement("div");
                barU.className = "chart-bar unique";
                barU.style.height = Math.max(2, (d.unique_users / maxVisits) * 150) + "px";
                barU.title = d.date + ": " + d.unique_users + " unique users";

                group.appendChild(bar);
                group.appendChild(barU);

                // Show date label every few bars
                if (i % 5 === 0 || i === data.daily.length - 1) {
                    var label = document.createElement("span");
                    label.className = "chart-date";
                    label.textContent = d.date.slice(5); // MM-DD
                    group.appendChild(label);
                }

                chartEl.appendChild(group);
            });

            // Map
            var map = L.map("map").setView([30, 0], 2);
            L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
                attribution: "",
                maxZoom: 18,
            }).addTo(map);

            data.locations.forEach(function (loc) {
                if (loc.lat && loc.lon) {
                    var radius = Math.min(20, Math.max(5, loc.users * 3));
                    L.circleMarker([loc.lat, loc.lon], {
                        radius: radius,
                        fillColor: "#0078D4",
                        color: "#005A9E",
                        weight: 1,
                        opacity: 0.8,
                        fillOpacity: 0.6,
                    }).addTo(map).bindPopup(
                        "<strong>" + loc.city + ", " + loc.country + "</strong><br>" +
                        loc.users + " user" + (loc.users > 1 ? "s" : "") + " &middot; " +
                        loc.visits + " visit" + (loc.visits > 1 ? "s" : "")
                    );
                }
            });

            // Countries table
            var tableEl = document.getElementById("countries-table");
            if (data.countries.length === 0) {
                tableEl.innerHTML = '<div class="loading">No data yet</div>';
                return;
            }
            var maxUsers = data.countries[0].users;
            var html = '<table class="country-table"><thead><tr><th>Country</th><th>Users</th><th></th></tr></thead><tbody>';
            data.countries.forEach(function (c) {
                var barWidth = Math.max(4, (c.users / maxUsers) * 100);
                html += '<tr><td>' + c.country + '</td><td>' + c.users + '</td><td><span class="country-bar" style="width:' + barWidth + 'px"></span></td></tr>';
            });
            html += '</tbody></table>';
            tableEl.innerHTML = html;

            // Provider chart
            var providerEl = document.getElementById("provider-chart");
            var providerColors = { anthropic: "#D97706", openai: "#10A37F", azure: "#0078D4" };
            var providerLabels = { anthropic: "Anthropic (Claude)", openai: "OpenAI (ChatGPT)", azure: "Azure Foundry" };

            if (!data.providers || data.providers.length === 0) {
                providerEl.innerHTML = '<div class="loading">No provider data yet</div>';
            } else {
                var maxProv = Math.max.apply(null, data.providers.map(function (p) { return p.users; }));
                providerEl.innerHTML = "";
                data.providers.forEach(function (p) {
                    var color = providerColors[p.provider] || "var(--ms-blue)";
                    var label = providerLabels[p.provider] || p.provider;
                    var barHeight = Math.max(4, (p.users / maxProv) * 110);
                    var item = document.createElement("div");
                    item.className = "provider-item";
                    item.innerHTML =
                        '<div class="provider-bar-wrap"><div class="provider-bar-fill" style="height:' + barHeight + 'px;background:' + color + '"></div></div>' +
                        '<div class="provider-name">' + label + '</div>' +
                        '<div class="provider-stats"><strong>' + p.users + '</strong>user' + (p.users !== 1 ? 's' : '') + ' &middot; ' + p.visits + ' visit' + (p.visits !== 1 ? 's' : '') + '</div>';
                    providerEl.appendChild(item);
                });
            }
        }

        loadReport();
    </script>
</body>
</html>
